# On every push to main/master: reset `production` to that exact tree, flip only
# js/app-build.js (MEMPOOL_PRODUCTION_BUILTIN = true), commit once, force-push.
# Dev sandbox stays on main/master with MEMPOOL_PRODUCTION_BUILTIN = false.

name: Sync production branch

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-production
  cancel-in-progress: true

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Mirror ${{ github.ref_name }} → production (embed flag only)
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git checkout -B production
          node scripts/set-mempool-build.cjs production
          git add js/app-build.js
          if git diff --cached --quiet; then
            echo "app-build.js already matched production flag — still aligning branch tip"
          else
            git commit -m "chore(production): embed flag (mirror ${{ github.ref_name }}@${{ github.sha }})"
          fi
          git push origin production --force
